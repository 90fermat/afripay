spring:
  application:
    name: afripay-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/afripay}
    username: ${DATABASE_USER:afripay}
    password: ${DATABASE_PASSWORD:afripay_dev_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:afripay_redis_dev}

afripay:
  security:
    jwt:
      secret: dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1mb3ItZGV2ZWxvcG1lbnQta2VlcC1pdC1zYWZl
      expiration-ms: 86400000

server:
  port: ${SERVER_PORT:8080}

# ============================================================
# AfriDevPay — Application Configuration
# ============================================================
# Values marked with ${ENV_VAR} MUST be set as environment
# variables. Never commit secrets to version control.
# ============================================================

spring:
  application:
    name: afripay-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/afripay}
    username: ${DATABASE_USER:afripay}
    password: ${DATABASE_PASSWORD:afripay_dev_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AfriPayHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 2048
  http2:
    enabled: true
  servlet:
    context-path: /
  error:
    whitelabel:
      enabled: false
    include-message: never
    include-stacktrace: never

spring.lifecycle:
  timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:local}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true

resilience4j:
  circuitbreaker:
    instances:
      mtn-momo:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      orange-money:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      wave:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        automatic-transition-from-open-to-half-open-enabled: true
      payment-initiation:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s

  retry:
    instances:
      provider-retry:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException

  timelimiter:
    instances:
      provider-timeout:
        timeout-duration: 30s
        cancel-running-future: true

afripay:
  security:
    api-key-cache-ttl-seconds: 300
    idempotency-key-ttl-hours: 24
  rate-limiting:
    enabled: true
    window-size-seconds: 60
  webhook:
    max-retry-attempts: 5
    signing-algorithm: HmacSHA256
    timeout-seconds: 10
  providers:
    timeout-seconds: 30
    mtn-momo:
      base-url: ${MTN_MOMO_BASE_URL:https://sandbox.momodeveloper.mtn.com}
      subscription-key: ${MTN_MOMO_SUBSCRIPTION_KEY:}
      api-user: ${MTN_MOMO_API_USER:}
      api-key: ${MTN_MOMO_API_KEY:}
    orange-money:
      base-url: ${ORANGE_MONEY_BASE_URL:https://api.orange.com/orange-money-webpay}
      client-id: ${ORANGE_CLIENT_ID:}
      client-secret: ${ORANGE_CLIENT_SECRET:}
    wave:
      base-url: ${WAVE_BASE_URL:https://api.wave.com}
      api-key: ${WAVE_API_KEY:}
